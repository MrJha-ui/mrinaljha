<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Speech Translator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Azure Speech + Translator</h1>
        <p class="subtitle">
            Speech Recognition + Language Translation using Azure AI Services
        </p>

        <div class="card">

            <h2>Azure Configuration</h2>

            <div class="input-group">
                <label>Speech API Key</label>
                <input type="password" id="speechKey" placeholder="Enter Speech API Key">
            </div>

            <div class="input-group">
                <label>Speech Region</label>
                <input type="text" id="speechRegion" placeholder="Example: eastus">
            </div>

            <div class="input-group">
                <label>Translator API Key</label>
                <input type="password" id="translatorKey" placeholder="Enter Translator API Key">
            </div>

            <div class="input-group">
                <label>Translator Region</label>
                <input type="text" id="translatorRegion" placeholder="Example: centralindia">
            </div>

            <div class="input-group">
                <label>Target Language</label>
                <select id="targetLanguage">
                    <option value="hi">Hindi</option>
                    <option value="fr">French</option>
                    <option value="es">Spanish</option>
                    <option value="de">German</option>
                    <option value="ja">Japanese</option>
                    <option value="ko">Korean</option>
                    <option value="ru">Russian</option>
                    <option value="ar">Arabic</option>
                </select>
            </div>

            <div class="button-group">
                <button id="startBtn">🎤 Start Listening</button>
                <button id="stopBtn">⏹ Stop</button>
            </div>

</html>
