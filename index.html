<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Text To Speech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Azure Text To Speech</h1>
    <p class="subtitle">
        Convert Text into AI Voice using Azure Speech Services
    </p>

    <div class="card">

        <h2>Azure Configuration</h2>

        <div class="input-group">
            <label>Speech API Key</label>
            <input type="password" id="speechKey" placeholder="Enter Azure Speech Key">
        </div>

        <div class="input-group">
            <label>Speech Region</label>
            <input type="text" id="speechRegion" placeholder="Example: centralindia">
        </div>

        <div class="input-group">
            <label>Enter Text</label>
            <textarea id="inputText" placeholder="Type something..."></textarea>
        </div>

        <div class="input-group">
            <label>Select Voice</label>

            <select id="voiceName">
                <option value="en-US-JennyNeural">
                    Jenny (Female US)
                </option>

                <option value="en-US-GuyNeural">
                    Guy (Male US)
                </option>

                <option value="en-IN-NeerjaNeural">
                    Neerja (Indian Female)
                </option>

                <option value="en-IN-PrabhatNeural">
                    Prabhat (Indian Male)
                </option>
            </select>
        </div>

        <button id="speakBtn">
            🔊 Convert To Speech
        </button>

    </div>

    <div class="card">
        <h2>Status</h2>

        <div id="translatedOutput" class="output-box">
            Waiting...
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
